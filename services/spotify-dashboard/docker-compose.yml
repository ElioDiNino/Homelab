services:
  server:
    image: ghcr.io/yooooomi/your_spotify_server:latest
    restart: always
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://localhost:8080/ || exit 1"]
      start_period: 20s
      interval: 30s
    environment:
      API_ENDPOINT: "https://sd.${INTERNAL_DOMAIN:?error}/api"
      CLIENT_ENDPOINT: "https://sd.${INTERNAL_DOMAIN:?error}"
      CORS: "https://sd.${INTERNAL_DOMAIN:?error}"
      SPOTIFY_PUBLIC: ${SPOTIFY_PUBLIC:?error}
      SPOTIFY_SECRET: ${SPOTIFY_SECRET:?error}
      TIMEZONE: ${TIMEZONE:?error}
      PROMETHEUS_USERNAME: ${PROMETHEUS_USERNAME:?error}
      PROMETHEUS_PASSWORD: ${PROMETHEUS_PASSWORD:?error}
    networks:
      - proxy-internal
      - database
    labels:
      diun.enable: true
      diun.watch_repo: false
      diun.include_tags: ^latest$
      caddy: "{$$WILDCARD_INTERNAL}"
      caddy.import: service_proxy sd
      caddy.import.handle_path: "/api/*"
      caddy.import.handle_path.reverse_proxy: "{{ upstreams 8080 }}"
      homepage.group: Analytics
      homepage.name: Spotify Dashboard
      homepage.icon: spotify
      homepage.href: https://sd.{{HOMEPAGE_VAR_INTERNAL_DOMAIN}}
      homepage.description: Spotify listening statistics
      homepage.weight: 200

  mongo:
    # Using an older version due to hardware compatibility
    image: mongo:4.4.18
    restart: always
    volumes:
      - data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo mongo:27017/your_spotify --quiet
      start_period: 40s
      interval: 10s
      timeout: 5s
    networks:
      - database

  web:
    image: ghcr.io/yooooomi/your_spotify_client:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:3000 || exit 1"]
      start_period: 30s
      start_interval: 5s
      interval: 30s
    environment:
      API_ENDPOINT: "https://sd.${INTERNAL_DOMAIN:?error}/api"
    networks:
      - proxy-internal
    labels:
      diun.enable: true
      diun.watch_repo: false
      diun.include_tags: ^latest$
      sablier.enable: true
      sablier.group: sd
      caddy: "{$$WILDCARD_INTERNAL}"
      caddy.import: service_proxy sd
      caddy.import.import: sablier sd dynamic
      caddy.import.reverse_proxy: "* {{ upstreams 3000 }}"

volumes:
  data:

networks:
  database:
    internal: true
  proxy-internal:
    external: true
